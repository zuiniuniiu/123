<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - SeatBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/seatbook.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--seatbook-bg);
      padding: 20px;
    }
  </style>
</head>
<body>
<div class="login-page">
  <div class="card-seatbook" style="width:100%;max-width:400px;">
    <div class="card-body" style="padding:32px;">
      <div class="text-center mb-4">
        <h4 style="font-weight:700;color:var(--seatbook-primary);">SeatBook</h4>
        <p style="font-size:0.875rem;color:var(--seatbook-text-secondary);margin:0;">管理员登录</p>
      </div>

      <!-- 错误提示（初始隐藏） -->
      <div id="login-error" class="alert alert-seatbook-error d-none mb-3">用户名或密码错误</div>

      <form id="admin-login-form">
        <div class="mb-3">
          <label class="form-label-seatbook">用户名</label>
          <input type="text" id="login-username" class="form-control form-control-seatbook" placeholder="请输入管理员账号" value="admin">
        </div>
        <div class="mb-4">
          <label class="form-label-seatbook">密码</label>
          <input type="password" id="login-password" class="form-control form-control-seatbook" placeholder="请输入密码" value="admin123">
        </div>
        <button type="submit" class="btn btn-seatbook w-100">登 录</button>
      </form>

      <div class="mt-3 text-center">
        <a href="index.html" style="font-size:0.8125rem;color:var(--seatbook-text-secondary);text-decoration:none;">&larr; 返回用户首页</a>
      </div>

      <div class="mt-4 text-center" style="font-size:0.75rem;color:var(--seatbook-text-secondary);">
        演示账号：admin / admin123
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/seatbook.js"></script>
</body>
</html>
