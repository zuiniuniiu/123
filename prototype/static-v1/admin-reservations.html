<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约管理 - SeatBook 管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/seatbook.css">
</head>
<body>

<!-- 管理端导航 -->
<nav class="navbar navbar-expand admin-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="admin-reservations.html" style="font-size:1rem;">SeatBook 管理后台</a>
    <div class="d-flex align-items-center">
      <a class="nav-link active" href="admin-reservations.html">预约管理</a>
      <a class="nav-link" href="admin-seats.html">座位管理</a>
      <a class="nav-link" href="admin-statistics.html">统计页</a>
      <a class="logout-btn ms-3" href="#">退出登录</a>
    </div>
  </div>
</nav>

<div class="admin-content">
  <div class="page-header">
    <h4>预约管理</h4>
    <span style="font-size:0.8125rem;color:var(--seatbook-text-secondary);">共 5 条记录</span>
  </div>

  <!-- 筛选区 -->
  <div class="filter-bar">
    <select class="form-select" style="max-width:160px;">
      <option>全部状态</option>
      <option>已预约</option>
      <option>已完成</option>
      <option>已取消</option>
    </select>
    <input type="text" class="form-control" placeholder="搜索用户或座位号" style="max-width:220px;border:1px solid var(--seatbook-border);border-radius:6px;font-size:0.875rem;padding:6px 12px;">
  </div>

  <!-- 预约表格 -->
  <div style="overflow-x:auto;">
    <table class="table table-seatbook" style="width:100%;">
      <thead>
        <tr>
          <th>ID</th>
          <th>用户</th>
          <th>座位</th>
          <th>区域</th>
          <th>日期</th>
          <th>时段</th>
          <th>状态</th>
          <th style="text-align:center;">操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>张三</td>
          <td>A-01</td>
          <td>三楼自习区</td>
          <td>2026-07-07</td>
          <td>08:00-12:00</td>
          <td><span class="status-badge status-badge-booked"><span class="dot"></span> 已预约</span></td>
          <td style="text-align:center;"><button class="btn btn-seatbook-success btn-seatbook-sm btn-complete">标记完成</button></td>
        </tr>
        <tr>
          <td>2</td>
          <td>李四</td>
          <td>C-01</td>
          <td>五楼电子阅览</td>
          <td>2026-07-07</td>
          <td>14:00-18:00</td>
          <td><span class="status-badge status-badge-booked"><span class="dot"></span> 已预约</span></td>
          <td style="text-align:center;"><button class="btn btn-seatbook-success btn-seatbook-sm btn-complete">标记完成</button></td>
        </tr>
        <tr>
          <td>3</td>
          <td>张三</td>
          <td>B-02</td>
          <td>四楼安静区</td>
          <td>2026-07-06</td>
          <td>14:00-18:00</td>
          <td><span class="status-badge status-badge-completed"><span class="dot"></span> 已完成</span></td>
          <td style="text-align:center;"><span style="font-size:0.8125rem;color:var(--seatbook-text-secondary);">—</span></td>
        </tr>
        <tr>
          <td>4</td>
          <td>王五</td>
          <td>A-02</td>
          <td>三楼自习区</td>
          <td>2026-07-05</td>
          <td>18:00-21:00</td>
          <td><span class="status-badge status-badge-cancelled"><span class="dot"></span> 已取消</span></td>
          <td style="text-align:center;"><span style="font-size:0.8125rem;color:var(--seatbook-text-secondary);">—</span></td>
        </tr>
        <tr>
          <td>5</td>
          <td>李四</td>
          <td>A-03</td>
          <td>三楼自习区</td>
          <td>2026-07-04</td>
          <td>08:00-12:00</td>
          <td><span class="status-badge status-badge-completed"><span class="dot"></span> 已完成</span></td>
          <td style="text-align:center;"><span style="font-size:0.8125rem;color:var(--seatbook-text-secondary);">—</span></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- 空状态（注释，备选演示） -->
  <!--
  <div class="empty-state">
    <div class="empty-icon">📋</div>
    <div class="empty-text">暂无预约记录</div>
  </div>
  -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/seatbook.js"></script>
</body>
</html>
