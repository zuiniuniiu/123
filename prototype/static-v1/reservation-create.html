<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>确认预约 - SeatBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/seatbook.css">
</head>
<body>

<nav class="navbar navbar-expand navbar-seatbook sticky-top">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="index.html">SeatBook</a>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <a class="nav-link" href="seat-list.html">座位</a>
      <a class="nav-link" href="my-reservations.html">我的预约</a>
      <div class="user-switch">
        <select class="form-select form-select-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:4px;font-size:0.8125rem;padding:4px 8px;">
          <option selected>张三</option>
          <option>李四</option>
          <option>王五</option>
        </select>
      </div>
    </div>
  </div>
</nav>

<div class="mobile-container">
  <div class="d-flex align-items-center mb-3">
    <a href="seat-detail.html?id=1" class="text-decoration-none me-2" style="color:var(--seatbook-text-secondary);font-size:1.25rem;">&larr;</a>
    <h5 class="page-title mb-0">确认预约</h5>
  </div>

  <!-- 成功状态 -->
  <div id="reservation-success" class="alert alert-seatbook-success d-none mb-3">✅ 预约成功！正在跳转至我的预约…</div>
  <!-- 失败状态（冲突） -->
  <div id="reservation-error" class="alert alert-seatbook-error d-none mb-3">该时段已被预约，请选择其他时段</div>

  <!-- 预约信息确认卡 -->
  <div class="card-seatbook mb-4">
    <div class="card-body">
      <h6 style="font-weight:600;font-size:1rem;margin-bottom:16px;">请确认预约信息</h6>
      <div class="info-row">
        <span class="label">座位</span>
        <span class="value">A-01</span>
      </div>
      <div class="info-row">
        <span class="label">区域</span>
        <span class="value">三楼自习区</span>
      </div>
      <div class="info-row">
        <span class="label">日期</span>
        <span class="value">2026-07-07</span>
      </div>
      <div class="info-row">
        <span class="label">时段</span>
        <span class="value">08:00 - 12:00</span>
      </div>
      <div class="info-row">
        <span class="label">预约人</span>
        <span class="value">张三</span>
      </div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="d-grid gap-3">
    <button id="submit-reservation" class="btn btn-seatbook-success btn-lg">确认预约</button>
    <a href="seat-detail.html?id=1" class="btn btn-seatbook-outline">返回修改</a>
  </div>

  <div class="bottom-spacer"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/seatbook.js"></script>
</body>
</html>
