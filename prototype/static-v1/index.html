<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeatBook - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/seatbook.css">
</head>
<body>

<!-- 顶部导航 -->
<nav class="navbar navbar-expand navbar-seatbook sticky-top">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="index.html">SeatBook</a>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <a class="nav-link" href="seat-list.html">座位</a>
      <a class="nav-link" href="my-reservations.html">我的预约</a>
      <div class="user-switch">
        <select class="form-select form-select-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:4px;font-size:0.8125rem;padding:4px 8px;">
          <option>张三</option>
          <option>李四</option>
          <option>王五</option>
        </select>
      </div>
    </div>
  </div>
</nav>

<div class="mobile-container">
  <!-- 欢迎区域 -->
  <div class="welcome-section">
    <h1>📚 今天想去哪里自习？</h1>
    <p class="greeting">当前用户：<strong id="current-user">张三</strong></p>
  </div>

  <!-- 推荐座位 -->
  <h5 style="font-size:1rem;font-weight:600;color:var(--seatbook-text);margin-bottom:12px;">🌟 推荐空闲座位</h5>
  <div class="d-flex gap-3 overflow-auto pb-2" style="scrollbar-width:none;-ms-overflow-style:none;">
    <a href="seat-detail.html?id=1" class="recommend-card text-decoration-none" style="flex-shrink:0;">
      <div class="seat-num">A-01</div>
      <div class="seat-area">三楼自习区</div>
      <div class="seat-status">
        <span class="status-badge status-badge-available"><span class="dot"></span> 空闲</span>
      </div>
    </a>
    <a href="seat-detail.html?id=2" class="recommend-card text-decoration-none" style="flex-shrink:0;">
      <div class="seat-num">A-03</div>
      <div class="seat-area">三楼自习区</div>
      <div class="seat-status">
        <span class="status-badge status-badge-available"><span class="dot"></span> 空闲</span>
      </div>
    </a>
    <a href="seat-detail.html?id=3" class="recommend-card text-decoration-none" style="flex-shrink:0;">
      <div class="seat-num">B-02</div>
      <div class="seat-area">四楼安静区</div>
      <div class="seat-status">
        <span class="status-badge status-badge-available"><span class="dot"></span> 空闲</span>
      </div>
    </a>
    <a href="seat-detail.html?id=4" class="recommend-card text-decoration-none" style="flex-shrink:0;">
      <div class="seat-num">C-01</div>
      <div class="seat-area">五楼电子阅览</div>
      <div class="seat-status">
        <span class="status-badge status-badge-available"><span class="dot"></span> 空闲</span>
      </div>
    </a>
  </div>

  <!-- 快捷入口 -->
  <div class="mt-4 d-grid gap-3">
    <a href="seat-list.html" class="btn btn-seatbook btn-lg">查看全部座位</a>
    <a href="my-reservations.html" class="btn btn-seatbook-outline btn-lg">我的预约</a>
  </div>

  <!-- 底部信息 -->
  <div class="mt-5 text-center" style="font-size:0.75rem;color:var(--seatbook-text-secondary);">
    <p>SeatBook · 图书馆座位预约系统<br>静态原型 v1 · 仅供演示</p>
  </div>
</div>

<!-- Toast 提示 -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
  <div id="switch-toast" class="toast align-items-center text-bg-primary border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/seatbook.js"></script>
</body>
</html>
