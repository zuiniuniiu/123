<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>统计页 - SeatBook 管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/seatbook.css">
</head>
<body>

<nav class="navbar navbar-expand admin-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="admin-reservations.html" style="font-size:1rem;">SeatBook 管理后台</a>
    <div class="d-flex align-items-center">
      <a class="nav-link" href="admin-reservations.html">预约管理</a>
      <a class="nav-link" href="admin-seats.html">座位管理</a>
      <a class="nav-link active" href="admin-statistics.html">统计页</a>
      <a class="logout-btn ms-3" href="#">退出登录</a>
    </div>
  </div>
</nav>

<div class="admin-content">
  <div class="page-header">
    <h4>数据统计</h4>
    <span style="font-size:0.8125rem;color:var(--seatbook-text-secondary);">数据更新至 2026-07-06</span>
  </div>

  <!-- 统计卡片 -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-number">8</div>
        <div class="stat-label">座位总数</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-number">5</div>
        <div class="stat-label">今日预约数</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-number">28</div>
        <div class="stat-label">本月预约数</div>
      </div>
    </div>
  </div>

  <!-- 各时段预约分布 -->
  <div class="card-seatbook mb-4">
    <div class="card-body">
      <h6 style="font-weight:600;font-size:1rem;margin-bottom:16px;">各时段预约分布</h6>
      <table class="table time-slot-table" style="width:100%;">
        <thead>
          <tr>
            <th style="width:120px;">时段</th>
            <th>预约次数</th>
            <th>占比</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>08:00 - 12:00</td>
            <td>15</td>
            <td class="bar-cell">
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="bar" style="width:75%;"></div>
                <span style="font-size:0.8125rem;color:var(--seatbook-text-secondary);">75%</span>
              </div>
            </td>
          </tr>
          <tr>
            <td>14:00 - 18:00</td>
            <td>10</td>
            <td class="bar-cell">
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="bar" style="width:50%;"></div>
                <span style="font-size:0.8125rem;color:var(--seatbook-text-secondary);">50%</span>
              </div>
            </td>
          </tr>
          <tr>
            <td>18:00 - 21:00</td>
            <td>3</td>
            <td class="bar-cell">
              <div style="display:flex;align-items:center;gap:8px;">
                <div class="bar" style="width:15%;"></div>
                <span style="font-size:0.8125rem;color:var(--seatbook-text-secondary);">15%</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 各区域座位分布 -->
  <div class="card-seatbook">
    <div class="card-body">
      <h6 style="font-weight:600;font-size:1rem;margin-bottom:16px;">各区域座位分布</h6>
      <table class="table time-slot-table" style="width:100%;">
        <thead>
          <tr>
            <th>区域</th>
            <th>座位数</th>
            <th>空闲</th>
            <th>已预约</th>
            <th>维护中</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>三楼自习区</td>
            <td>3</td>
            <td>2</td>
            <td>1</td>
            <td>0</td>
          </tr>
          <tr>
            <td>四楼安静区</td>
            <td>3</td>
            <td>2</td>
            <td>0</td>
            <td>1</td>
          </tr>
          <tr>
            <td>五楼电子阅览</td>
            <td>2</td>
            <td>0</td>
            <td>2</td>
            <td>0</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="bottom-spacer"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/seatbook.js"></script>
</body>
</html>
