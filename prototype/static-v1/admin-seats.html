<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位管理 - SeatBook 管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/seatbook.css">
</head>
<body>

<nav class="navbar navbar-expand admin-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="admin-reservations.html" style="font-size:1rem;">SeatBook 管理后台</a>
    <div class="d-flex align-items-center">
      <a class="nav-link" href="admin-reservations.html">预约管理</a>
      <a class="nav-link active" href="admin-seats.html">座位管理</a>
      <a class="nav-link" href="admin-statistics.html">统计页</a>
      <a class="logout-btn ms-3" href="#">退出登录</a>
    </div>
  </div>
</nav>

<div class="admin-content">
  <div class="page-header">
    <h4>座位管理</h4>
    <button class="btn btn-seatbook btn-seatbook-sm" data-bs-toggle="modal" data-bs-target="#addSeatModal">+ 新增座位</button>
  </div>

  <!-- 座位表格 -->
  <div style="overflow-x:auto;">
    <table class="table table-seatbook" style="width:100%;">
      <thead>
        <tr>
          <th>编号</th>
          <th>座位编号</th>
          <th>区域</th>
          <th>楼层</th>
          <th>描述</th>
          <th>状态</th>
          <th style="text-align:center;min-width:200px;">操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td><strong>A-01</strong></td>
          <td>三楼自习区</td>
          <td>3F</td>
          <td>靠窗，安静</td>
          <td><span class="status-badge status-badge-available"><span class="dot"></span> 空闲</span></td>
          <td style="text-align:center;">
            <button class="btn btn-seatbook-outline btn-seatbook-sm me-1" data-bs-toggle="modal" data-bs-target="#editSeatModal">编辑</button>
            <button class="btn btn-seatbook-success btn-seatbook-sm me-1 btn-toggle-status">设为维护</button>
            <button class="btn btn-seatbook-danger btn-seatbook-sm btn-delete-seat" data-bs-toggle="modal" data-bs-target="#deleteSeatModal">删除</button>
          </td>
        </tr>
        <tr>
          <td>2</td>
          <td><strong>A-02</strong></td>
          <td>三楼自习区</td>
          <td>3F</td>
          <td>中间位置</td>
          <td><span class="status-badge status-badge-booked"><span class="dot"></span> 已预约</span></td>
          <td style="text-align:center;">
            <button class="btn btn-seatbook-outline btn-seatbook-sm me-1" disabled style="opacity:0.5;">编辑</button>
            <span style="font-size:0.8125rem;color:var(--seatbook-text-secondary);">不可操作</span>
            <button class="btn btn-seatbook-danger btn-seatbook-sm ms-1" disabled style="opacity:0.5;">删除</button>
          </td>
        </tr>
        <tr>
          <td>3</td>
          <td><strong>A-03</strong></td>
          <td>三楼自习区</td>
          <td>3F</td>
          <td>靠门</td>
          <td><span class="status-badge status-badge-available"><span class="dot"></span> 空闲</span></td>
          <td style="text-align:center;">
            <button class="btn btn-seatbook-outline btn-seatbook-sm me-1" data-bs-toggle="modal" data-bs-target="#editSeatModal">编辑</button>
            <button class="btn btn-seatbook-success btn-seatbook-sm me-1 btn-toggle-status">设为维护</button>
            <button class="btn btn-seatbook-danger btn-seatbook-sm">删除</button>
          </td>
        </tr>
        <tr>
          <td>4</td>
          <td><strong>B-01</strong></td>
          <td>四楼安静区</td>
          <td>4F</td>
          <td>靠窗</td>
          <td><span class="status-badge status-badge-maintenance"><span class="dot"></span> 维护中</span></td>
          <td style="text-align:center;">
            <button class="btn btn-seatbook-outline btn-seatbook-sm me-1" data-bs-toggle="modal" data-bs-target="#editSeatModal">编辑</button>
            <button class="btn btn-seatbook-success btn-seatbook-sm me-1 btn-toggle-status">设为空闲</button>
            <button class="btn btn-seatbook-danger btn-seatbook-sm">删除</button>
          </td>
        </tr>
        <tr>
          <td>5</td>
          <td><strong>B-02</strong></td>
          <td>四楼安静区</td>
          <td>4F</td>
          <td>中间位置</td>
          <td><span class="status-badge status-badge-available"><span class="dot"></span> 空闲</span></td>
          <td style="text-align:center;">
            <button class="btn btn-seatbook-outline btn-seatbook-sm me-1" data-bs-toggle="modal" data-bs-target="#editSeatModal">编辑</button>
            <button class="btn btn-seatbook-success btn-seatbook-sm me-1 btn-toggle-status">设为维护</button>
            <button class="btn btn-seatbook-danger btn-seatbook-sm">删除</button>
          </td>
        </tr>
        <tr>
          <td>6</td>
          <td><strong>C-01</strong></td>
          <td>五楼电子阅览</td>
          <td>5F</td>
          <td>有电源</td>
          <td><span class="status-badge status-badge-booked"><span class="dot"></span> 已预约</span></td>
          <td style="text-align:center;">
            <span style="font-size:0.8125rem;color:var(--seatbook-text-secondary);">不可操作</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- 空状态（备选） -->
  <!--
  <div class="empty-state">
    <div class="empty-icon">🪑</div>
    <div class="empty-text">暂无座位数据，点击新增添加第一个座位</div>
  </div>
  -->
</div>

<!-- 新增座位 Modal -->
<div class="modal fade modal-seatbook" id="addSeatModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" style="font-weight:600;">新增座位</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label-seatbook">座位编号</label>
          <input type="text" class="form-control form-control-seatbook" placeholder="如 C-03">
        </div>
        <div class="mb-3">
          <label class="form-label-seatbook">区域</label>
          <input type="text" class="form-control form-control-seatbook" placeholder="如 三楼自习区">
        </div>
        <div class="mb-3">
          <label class="form-label-seatbook">楼层</label>
          <input type="text" class="form-control form-control-seatbook" placeholder="如 3F">
        </div>
        <div class="mb-3">
          <label class="form-label-seatbook">描述</label>
          <textarea class="form-control form-control-seatbook" rows="2" placeholder="可选" style="height:auto;"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-seatbook-outline btn-seatbook-sm" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-seatbook btn-seatbook-sm" data-bs-dismiss="modal">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- 编辑座位 Modal -->
<div class="modal fade modal-seatbook" id="editSeatModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" style="font-weight:600;">编辑座位</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label-seatbook">座位编号</label>
          <input type="text" class="form-control form-control-seatbook" value="A-01">
        </div>
        <div class="mb-3">
          <label class="form-label-seatbook">区域</label>
          <input type="text" class="form-control form-control-seatbook" value="三楼自习区">
        </div>
        <div class="mb-3">
          <label class="form-label-seatbook">楼层</label>
          <input type="text" class="form-control form-control-seatbook" value="3F">
        </div>
        <div class="mb-3">
          <label class="form-label-seatbook">描述</label>
          <textarea class="form-control form-control-seatbook" rows="2" style="height:auto;">靠窗，安静</textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-seatbook-outline btn-seatbook-sm" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-seatbook btn-seatbook-sm" data-bs-dismiss="modal">保存修改</button>
      </div>
    </div>
  </div>
</div>

<!-- 删除确认 Modal -->
<div class="modal fade modal-seatbook" id="deleteSeatModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" style="font-weight:600;">确认删除</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        确定要删除该座位吗？删除后不可恢复。
      </div>
      <div class="modal-footer">
        <button class="btn btn-seatbook-outline btn-seatbook-sm" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-seatbook-danger btn-seatbook-sm" data-bs-dismiss="modal">确认删除</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/seatbook.js"></script>
</body>
</html>
