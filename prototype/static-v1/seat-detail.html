<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位详情 - SeatBook</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/seatbook.css">
</head>
<body>

<!-- 顶部导航 -->
<nav class="navbar navbar-expand navbar-seatbook sticky-top">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="index.html">SeatBook</a>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <a class="nav-link" href="seat-list.html">座位</a>
      <a class="nav-link" href="my-reservations.html">我的预约</a>
      <div class="user-switch">
        <select class="form-select form-select-sm" style="background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:4px;font-size:0.8125rem;padding:4px 8px;">
          <option selected>张三</option>
          <option>李四</option>
          <option>王五</option>
        </select>
      </div>
    </div>
  </div>
</nav>

<div class="mobile-container">
  <div class="d-flex align-items-center mb-3">
    <a href="seat-list.html" class="text-decoration-none me-2" style="color:var(--seatbook-text-secondary);font-size:1.25rem;">&larr;</a>
    <h5 class="page-title mb-0">座位详情</h5>
  </div>

  <!-- 座位信息卡片 -->
  <div class="card-seatbook mb-4">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 style="font-weight:700;margin:0;">A-01</h4>
        <span class="status-badge status-badge-available"><span class="dot"></span> 空闲</span>
      </div>
      <div class="info-row">
        <span class="label">区域</span>
        <span class="value">三楼自习区</span>
      </div>
      <div class="info-row">
        <span class="label">楼层</span>
        <span class="value">3F</span>
      </div>
      <div class="info-row">
        <span class="label">描述</span>
        <span class="value">靠窗位置，光线好，安静</span>
      </div>
    </div>
  </div>

  <!-- 预约表单 -->
  <div class="card-seatbook">
    <div class="card-body">
      <h6 style="font-weight:600;font-size:1rem;margin-bottom:16px;">预约此座位</h6>

      <!-- 错误提示 -->
      <div id="reservation-error" class="alert alert-seatbook-error d-none mb-3"></div>
      <!-- 成功提示 -->
      <div id="reservation-success" class="alert alert-seatbook-success d-none mb-3">✅ 预约成功！正在跳转…</div>

      <div class="mb-3">
        <label class="form-label-seatbook">选择日期</label>
        <input type="date" id="res-date" class="form-control form-control-seatbook" value="2026-07-07">
      </div>
      <div class="mb-3">
        <label class="form-label-seatbook">选择时段</label>
        <select id="res-time" class="form-select form-control-seatbook">
          <option value="">请选择时段</option>
          <option value="08:00-12:00">08:00 - 12:00</option>
          <option value="14:00-18:00">14:00 - 18:00</option>
          <option value="18:00-21:00">18:00 - 21:00</option>
        </select>
      </div>

      <button id="submit-reservation" class="btn btn-seatbook w-100">提交预约</button>
    </div>
  </div>

  <div class="bottom-spacer"></div>
</div>

<!-- Toast 提示 -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
  <div id="switch-toast" class="toast align-items-center text-bg-primary border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/seatbook.js"></script>
</body>
</html>
